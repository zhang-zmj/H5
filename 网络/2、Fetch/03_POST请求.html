<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>POST请求</title>
  </head>
  <body>
    <script>
      fetch("https://www.baidu.com/books", {
        // method: "post",
        method: "put",
        body: "usename=list&pwd=123",
        headers: {
          "Content-type": "applycation/x-www-form-urlencoded",
        },
      })
        .then((data) => {
          return data.text();
        })
        .then((data) => {
          console.log(data);
        });

      fetch("https://www.baidu.com/books", {
        // method: "post",
        method: "put",
        body: JSON.stringify({
          usename: "zhangmj",
          pwd: "123",
        }),
        headers: {
          "Content-type": "applycation/x-www-form-urlencoded",
        },
      })
        .then((data) => {
          return data.text();
        })
        .then((data) => {
          console.log(data);
        });
    </script>
  </body>
</html>
