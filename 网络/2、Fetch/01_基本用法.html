<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>基本用法</title>
  </head>
  <body>
    <script>
      fetch("https://www.baidu.com")
        .then((data) => {
          // text() 是fetchAPI的一部分，返回一个Promise实例对象
          return data.text();
        })
        .then((data) => {
          console.log(data);
        });
    </script>
  </body>
</html>
