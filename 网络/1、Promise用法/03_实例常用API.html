<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>常用API</title>
  </head>
  <body>
    <!-- 
    实例方法：
      p.then() 得到异步任务的正确结果
      p.catch() 获取异常信息
      p.finally() 成功与否都会执行
   -->
    <script>
      function foo() {
        return new Promise((resolve, reject) => {
          setTimeout(() => {
            // resolve("hello");
            reject("error");
          }, 1000);
        });
      }
      foo()
        .then((data) => {
          console.log(data);
        })
        .catch((data) => {
          console.log(data);
        })
        .finally((data) => {
          console.log("finished");
        });

      /*
        foo()
        .then(
          (data) => {
            console.log(data);
          },
          (data) => {
            console.log(data);
          }
        )
        .finally((data) => {
          console.log("finished");
        });
    */
   
    </script>
  </body>
</html>
