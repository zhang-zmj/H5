<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>数组</title>

    <!-- 
      1、什么是数组?
        数组就是专门用于存储一组数据的
        注意点: 和我们前面学习的Number/String/Boolean/Null/undefined不同(基本数据类型)
                而我们今天学习的数组(Array)不是基本数据类型, 是引用数据类型(对象类型)
        
      2、和其它编程语言不同, 如果数组对应的索引中没有存储数据, 默认存储的就是undefined
      3、JavaScript中访问了数组中不存在的索引不会报错, 会返回undefined
      4、当JavaScript中数组的存储空间不够时数组会自动扩容
      5、JavaScript的数组可以存储不同类型数据
      6、JavaScript中数组分配的存储空间不一定是连续的
            在浏览器中各大浏览器也对数组分配存储空间进行了优化
            如果存储的都是相同类型的数据, 那么会尽量分配连续的存储空间
            如果存储的不是相同的数据类型, 那么就不会分配连续的存储空间
     -->
     
</head>
<body>

<script>

    // 数组定义
    var array1 = [1,2,3];       
    var array2 = [];
    var array3 = new Array(); 
    var array4 = new Array("关羽","张飞","刘备");
    var array5 = new Array(1,2,3);
    var array6 = new Array(3);      //长度为3的数组,每个数据的值是undefined
    console.log(array1);
    console.log(array2);
    console.log(array3);
    console.log(array4);
    console.log(array5);
    console.log(array6);


    //数组中存储的数据类型一定是一样的吗? 类型可以不一样
    var arr = [10,"哈哈",true,null,undefined,new Object()];
    console.log(arr);

</script>

    
</body>
</html>
