<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>01-文字属性</title>

    <style>
    
        p{
          /*  
          font-style: italic;  倾斜的 
          font-weight: bold;
          font-size: 20px;
          font-family: "楷体";
          */

          font: bold italic 10px "楷体";

     
            
        }

        /* 
        注意点：
            1、这种缩写格式中有的属性是可以省略的：
                style可以省略    weight可以省略  
            2、这种缩写格式style和weight的位置可以交换
            3、这种缩写格式中有的属性值是不可以省略的
                size不能省略    family不能省略
            4、 size和family的位置是不能随便乱放的
                size一定要写在family的前面，而且size和family 必须写在所有属性的最后。                 
         */
    
    </style>

</head>
<body>

    <!-- <i> 标签显示斜体文本效果 -->
    <i>我是文字</i> 

    <!-- <b> 标签规定粗体文本 -->
    <b>我是文字</b>
    <p>abc我是段落</p>
    
</body>
</html>
