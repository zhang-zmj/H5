<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>div和span标签</title>

<!-- 
        1、div
            * 一般用于配合css完成网页的基本布局
            * 单独占领一行
            * 容器级的标签：
                可以嵌套其他所有的标签
            * 
        2、span
            * 一般用于配合css修改网页的一些局部信息
            * 不会单独占领一行  
            * 文本级的标签  
                只能嵌套文字/超链接/图片
            *   
-->

<style>
    
    .header{
        width: 980px;
        height: 100px;
        background: red;
        margin: auto;
        margin-bottom: 10px;
    }

    .content{
        width: 980px;
        height: 500px;
        background: green;
        margin: auto;
        margin-bottom: 10px;
    }

    .footer{
        width: 980px;
        height: 100px;    
        background: blue;
        margin: auto;   
    }


    .logo {
        width: 200px;
        height: 50px;
        background: pink;
        float: left;
        margin: 20px;
    }

    .nav{
        width: 600px;
        height: 50px;
        background: yellow;
        float: left;
        margin: 20px;
    }

    .aside{
        width: 200px;
        height: 460px;
        background: purple;
        float: left;
        margin: 20px;
    }

    .article{
        width: 650px;
        height: 460px;
        background: deepskyblue;
        float: right;
        margin: 20px;
    }
    
    span{
        color: red;
    }






    
    </style>

</head>
<body>

    
    <div class="header">
        <div class="logo"></div>
        <div class="nav"></div>
    </div>
    <div class="content">
        <div class="aside"></div>
        <div class="article"></div>
    </div>
    <div class="footer"> </div>


    <p>努力到 <span>无能为力</span>, 拼搏到<span>感动自己</span></p>




    <div>
        <div>
            <ul>
                <li>
                    <img src="../images/picture.jpg" alt="">
                </li>
            </ul>
        </div>
    </div>


</body>
</html>
