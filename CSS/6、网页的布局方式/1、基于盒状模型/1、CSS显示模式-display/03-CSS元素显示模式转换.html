<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>CSS元素显示模式转换</title>

      <!-- 
        display取值：
            block 块级  独占一行
            inline 行内  不独占一行，不可以设置宽高
            inline-block 行内块级  不独占一行，可以设置宽高 
     -->

    <style>
    
        div{
            /* 块级元素转为行内元素 */
            display: inline;  
            background: red;
            width: 200px;
            height: 200px;
        }

        span{
            /* 转为块级元素 */
            display: block;
            background: green;
            width: 100px;
            height: 100px;
        }

        .cc{
            background: blue;
            width: 200px;
            height: 200px;
            /* 行内元素转为块级元素 */
            display: inline-block;
        }
    
    
    </style>


</head>
<body>
    
    <div>我是div</div>
    <div>我是div</div>

    <span>我是span</span>
    <span>我是span</span>

    <p class="cc">我是段落</p>
    <b class="cc">我是加粗</b>

</body>
</html>
