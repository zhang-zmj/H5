<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>主轴的对齐方式</title>

    <style>
      * {
        margin: 0;
        padding: 0;
      }

      ul {
        list-style: none;
        width: 600px;
        border: 1px solid #000;
        margin: 100px auto;
        display: flex;
        /*
            justify-content: 
              flex-start：     默认值, 起点开始依次排列
              flex-end：       终点开始依次排列
              center：         沿主轴居中排列
              space-between：
                  弹性盒子沿主轴均匀排列, 空白间距均分在相邻盒子之间
              space-around：   
                  弹性盒子沿主轴均匀排列, 空白间距均分在弹性盒子两侧
              space-evenly：
                 弹性盒子沿主轴均匀排列, 弹性盒子与容器之间间距相等
        */

        /* justify-content: flex-start; */
        /* justify-content: flex-end; */
        /* justify-content: center; */
        /* justify-content: space-between; */
        /* justify-content: space-evenly：; */
        justify-content: space-around;
      }

      ul > li {
        width: 100px;
        height: 100px;
        line-height: 100px;
        text-align: center;
        font-size: 30px;
        background: red;
      }

      ul > li:nth-child(2) {
        background: green;
      }
      ul > li:nth-child(3) {
        background: blue;
      }
    </style>
  </head>
  <body>
    <ul>
      <li>1</li>
      <li>2</li>
      <li>3</li>
      <li>4</li>
    </ul>
  </body>
</html>
